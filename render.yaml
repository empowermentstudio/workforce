services:
  - type: web
    name: church-volunteer-hub
    runtime: docker
    region: ohio
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /data
      - key: PORT
        value: 10000
      - key: CHURCH_NAME
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE
        sync: false
      - key: REMINDER_DAYS_AHEAD
        value: "3"
